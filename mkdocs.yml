site_name: colorgen
site_description: Generate terminal colorschemes from images
site_author: Piotr Krzysztof Lis
site_url: https://docs.colorgen.piotrkrzysztof.dev

repo_name: piotrkrzysztof/colorgen
repo_url: https://codeberg.org/piotrkrzysztof/colorgen
edit_uri: ""

theme:
  name: material
  palette:
    - scheme: default
      primary: deep purple
      accent: purple
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: deep purple
      accent: purple
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.suggest
    - content.code.copy
  icon:
    repo: fontawesome/brands/git-alt

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          options:
            docstring_style: google
            show_source: true
            show_root_heading: true

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - admonition
  - pymdownx.details
  - attr_list
  - tables
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Installation: installation.md
  - Quick Start: quickstart.md
  - Usage:
      - CLI Reference: usage/cli.md
      - Python API: usage/api.md
  - FAQ: faq.md

extra:
  social:
    - icon: fontawesome/brands/git-alt
      link: https://codeberg.org/piotrkrzysztof

copyright: Copyright &copy; 2026 Piotr Krzysztof Lis
